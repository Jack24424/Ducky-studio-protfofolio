<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ducky Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <span class="duck-emoji">🦆</span>
    <h1>Ducky Studio</h1>
    <p class="subtitle">
      We craft charming low-poly and medium-poly 3D models — from quirky characters and weapons to vehicles, props, and cozy environments. Pixel-perfect vibes with a ducky twist.
    </p>
  </header>

  <div class="gallery" id="gallery"></div>

  <!-- Lightbox -->
  <div id="lightbox">
    <span class="close-btn" onclick="closeLightbox()">×</span>
    <div class="lightbox-content">
      <span class="nav-arrow prev" onclick="changeImage(-1)">‹</span>
      <img id="lightbox-img" src="" alt="Expanded view">
      <p class="lightbox-desc" id="lightbox-desc"></p>
      <span class="nav-arrow next" onclick="changeImage(1)">›</span>
    </div>
  </div>

  <!-- Contact -->
  <section id="contact">
    <h2>Contact Us</h2>
    <div class="contact-buttons">
      <a href="https://discord.gg/YOUR_INVITE_HERE" target="_blank" class="contact-btn">
        <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/discord-white-icon.svg" alt="Discord">
        Join our Discord
      </a>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
